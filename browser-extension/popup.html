<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Research Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="root">
    <div class="header">
      <span class="mark">RESEARCH AGENT</span>
    </div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search any topic..." />
      <button id="search-btn">Go</button>
    </div>
    <div id="content">
      <p class="empty-state">Type a topic above, or right-click any selected text on a page and choose "Research...".</p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
